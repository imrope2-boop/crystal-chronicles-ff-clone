function createParticles(x, y, color, count) {
  for(let i=0; i<count; i++) {
    battle.particleSystem.push({
      x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.7)*8,
      life: 1.0, decay: 0.04+Math.random()*0.03, color,
      size: 3+Math.random()*5
    });
  }
}

function updateParticles() {
  battle.particleSystem = battle.particleSystem.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= p.decay;
    return p.life > 0;
  });
}

function startBattle(area) {
  const table = ENCOUNTERS[area] || ENCOUNTERS.grass;
  const count = 1 + Math.floor(Math.random() * 3);
  battle.enemies = [];
  const usedNames = [];
  for(let i=0; i<Math.min(count, 4); i++) {
    const name = table[Math.floor(Math.random()*table.length)];
    const template = ENEMIES[name];
    const suffix = usedNames.filter(n=>n===name).length > 0 ? '-' + (usedNames.filter(n=>n===name).length+1) : '';
    usedNames.push(name);
    battle.enemies.push({
      ...JSON.parse(JSON.stringify(template)),
      displayName: name + suffix,
      statusEffects: [],
      dead: false
    });
  }
  battle.turn = 0;
  battle.phase = 'select';
  battle.selectedMember = getFirstAlive();
  battle.currentMenu = 'main';
  battle.menuStack = [];
  battle.log = ['A battle begins!'];
  battle.particleSystem = [];
  battle.turnOrder = buildTurnOrder();
  battle.currentTurnIdx = 0;
  gameState = STATES.BATTLE;
}

function getFirstAlive() {
  return party.findIndex(m => m.alive && m.hp > 0);
}

function buildTurnOrder() {
  const order = [];
  party.forEach((m, i) => { if(m.alive) order.push({type:'player', idx:i, spd:m.spd+Math.random()*4}); });
  battle.enemies.forEach((e, i) => { if(!e.dead) order.push({type:'enemy', idx:i, spd:e.spd+Math.random()*4}); });
  return order.sort((a,b) => b.spd - a.spd);
}

function battleLog(msg) {
  battle.log.push(msg);
  if(battle.log.length > 5) battle.log.shift();
}

function applyDamage(target, dmg, isHeal) {
  if(isHeal) {
    target.hp = Math.min(target.maxHp, target.hp + dmg);
  } else {
    dmg = Math.max(1, dmg - (target.def || 0) / 3 | 0);
    target.hp = Math.max(0, target.hp - dmg);
    if(target.hp <= 0) {
      if(target.alive !== undefined) { target.alive = false; }
      else { target.dead = true; }
    }

let btl={enemies:[],phase:'select',selMember:0,selAction:null,selTarget:-1,selSpell:0,selItem:0,menu:'main',log:[],particles:[],animTimer:0,turnOrder:[],turnIdx:0,bgColor:'#000820'};
function mkEnemy(name){const t=ENEMIES[name];return{...JSON.parse(JSON.stringify(t)),maxHp:t.hp,maxMp:t.mp||0,displayName:name,dead:false,statusEffects:[]};}
function getAlive(){return party.findIndex(m=>m.alive&&m.hp>0);}
function bLog(msg){btl.log.push(msg);if(btl.log.length>5)btl.log.shift();}
function mkParticles(x,y,color,n){for(let i=0;i<n;i++)btl.particles.push({x,y,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.8)*9,life:1,decay:0.04+Math.random()*0.03,color,sz:2+Math.random()*5});}
function updParticles(){btl.particles=btl.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=p.decay;return p.life>0;});}
function startBattle(area){
const tbl=ENCOUNTERS[area]||ENCOUNTERS.grass;
const cnt=1+Math.floor(Math.random()*3);
btl.enemies=[];
const used={};
for(let i=0;i<Math.min(cnt,4);i++){
const n=tbl[Math.floor(Math.random()*tbl.length)];
used[n]=(used[n]||0)+1;
const e=mkEnemy(n);
if(used[n]>1)e.displayName=n+' '+(used[n]);
btl.enemies.push(e);
}
btl.phase='select';btl.selMember=getAlive();btl.menu='main';btl.log=['A battle begins!'];btl.particles=[];
btl.bgColor=area==='dungeon'?'#0A0005':area==='cave'?'#050A00':'#000820';
gameState=STATES.BATTLE;
}
function calcDmg(atk,spName){
if(spName){const sp=SPELLS[spName];const base=sp.dmgMin+Math.random()*(sp.dmgMax-sp.dmgMin);return Math.floor(base*(1+(atk.mag||10)*0.05));}
const s=atk.str||10;return Math.max(1,Math.floor(s*1.8+Math.random()*s*0.6));
}
function applyDmg(tgt,dmg,heal){
if(heal){tgt.hp=Math.min(tgt.maxHp,tgt.hp+dmg);return dmg;}
const red=Math.floor((tgt.def||0)/3);
const actual=Math.max(1,dmg-red);
tgt.hp=Math.max(0,tgt.hp-actual);
if(tgt.hp<=0){if('alive'in tgt)tgt.alive=false;else tgt.dead=true;}
return actual;
}

function doPlayerAction(mbr,action,tgt,spName,itemName){
let msg='',color=COL.RED;
if(action==='attack'){
const d=calcDmg(mbr);const a=applyDmg(tgt,d,false);
msg=mbr.name+' attacks '+tgt.displayName+'! '+a+' dmg!';
mkParticles(560+btl.enemies.indexOf(tgt)*90,280,COL.RED,10);
if(tgt.dead)msg+=' KO!';
}else if(action==='magic'&&spName){
const sp=SPELLS[spName];if(!sp)return 'No spell!';
if(mbr.mp<sp.mp)return 'Not enough MP!';
mbr.mp-=sp.mp;color=sp.color||COL.BLUE;
if(sp.type==='heal'){const h=Math.floor(sp.dmgMin+Math.random()*(sp.dmgMax-sp.dmgMin));const a=applyDmg(tgt,h,true);msg=mbr.name+' casts '+spName+'! '+tgt.name+' +'+a+' HP!';mkParticles(140+party.indexOf(tgt)*150,350,color,12);}
else if(sp.type==='revive'){tgt.alive=true;tgt.hp=Math.max(1,Math.floor(tgt.maxHp*0.3));msg=mbr.name+' casts '+spName+'! '+tgt.name+' revived!';mkParticles(140+party.indexOf(tgt)*150,350,'#FFFFFF',20);}
else if(sp.type==='drain'){const d=calcDmg(mbr,spName);const a=applyDmg(tgt,d,false);mbr.hp=Math.min(mbr.maxHp,mbr.hp+(a>>1));msg=mbr.name+' drains '+tgt.displayName+'! '+a+' stolen!';mkParticles(560+btl.enemies.indexOf(tgt)*90,280,color,12);}
else if(sp.tgt==='all'){let tot=0;btl.enemies.forEach(e=>{if(!e.dead){const d=calcDmg(mbr,spName);const a=applyDmg(e,d,false);tot+=a;}});msg=mbr.name+' casts '+spName+'! ~'+(tot/(btl.enemies.length||1)|0)+' avg dmg!';mkParticles(500,250,color,25);}
else{const d=calcDmg(mbr,spName);const a=applyDmg(tgt,d,false);msg=mbr.name+' casts '+spName+'! '+tgt.displayName+' '+a+' dmg!';mkParticles(560+btl.enemies.indexOf(tgt)*90,280,color,15);if(tgt.dead)msg+=' KO!';}
}else if(action==='item'){
const itm=inventory.items.find(i=>i.name===itemName);if(!itm||itm.qty<=0)return 'No items!';
itm.qty--;if(itm.qty<=0)inventory.items=inventory.items.filter(i=>i.qty>0);
if(itm.effect==='heal'){const a=applyDmg(tgt,itm.value,true);msg=mbr.name+' uses '+itemName+'! '+tgt.name+' +'+a+' HP!';}
else if(itm.effect==='mp'){tgt.mp=Math.min(tgt.maxMp,tgt.mp+itm.value);msg=mbr.name+' uses '+itemName+'! '+tgt.name+' +'+itm.value+' MP!';}
else if(itm.effect==='revive'){tgt.alive=true;tgt.hp=Math.max(1,Math.floor(tgt.maxHp*0.3));msg=mbr.name+' uses '+itemName+'! '+tgt.name+' revived!';}
else if(itm.effect==='elixir'){tgt.hp=tgt.maxHp;tgt.mp=tgt.maxMp;msg=mbr.name+' uses '+itemName+'! '+tgt.name+' fully restored!';}
else if(itm.effect==='cure_poison'){tgt.statusEffects=(tgt.statusEffects||[]).filter(s=>s!=='poison');msg=mbr.name+' uses '+itemName+'! '+tgt.name+' cured!';}
else if(itm.effect==='rest'){party.forEach(m=>{if(m.alive){m.hp=Math.min(m.maxHp,m.hp+150);m.mp=Math.min(m.maxMp,m.mp+40);}});msg='The party rests and recovers!';}
mkParticles(140+party.indexOf(tgt)*150,350,COL.GREEN,10);
}
bLog(msg);return msg;
}
function doEnemyTurn(enemy){
const alive=party.filter(m=>m.alive&&m.hp>0);if(alive.length===0)return;
const tgt=alive[Math.floor(Math.random()*alive.length)];
const acts=enemy.actions||['attack'];
let act=acts[Math.floor(Math.random()*acts.length)];
if(act==='magic'&&(!enemy.spells||!enemy.spells.length||enemy.mp<5))act='attack';
let msg='';
if(act==='magic'&&enemy.spells&&enemy.spells.length){
const sn=enemy.spells[Math.floor(Math.random()*enemy.spells.length)];
const sp=SPELLS[sn];if(enemy.mp>=sp.mp){
enemy.mp-=sp.mp;
if(sp.tgt==='all'){party.forEach(m=>{if(m.alive){const d=calcDmg(enemy,sn);const a=applyDmg(m,d,false);}});msg=enemy.displayName+' casts '+sn+'! Party hit!';}
else{const d=calcDmg(enemy,sn);const a=applyDmg(tgt,d,false);msg=enemy.displayName+' casts '+sn+'! '+tgt.name+' '+a+' dmg!';if(!tgt.alive)msg+=' KO!';mkParticles(140+party.indexOf(tgt)*150,350,sp.color||'#FF00FF',12);}
}else act='attack';
}
if(act==='drain'){const d=calcDmg(enemy);const a=applyDmg(tgt,d,false);enemy.hp=Math.min(enemy.maxHp,enemy.hp+(a>>1));msg=enemy.displayName+' drains '+tgt.name+'! '+a+' HP!';}
else if(act==='special'){const d=Math.floor(calcDmg(enemy)*1.6);const a=applyDmg(tgt,d,false);msg=enemy.displayName+' uses special on '+tgt.name+'! '+a+' dmg!';if(!tgt.alive)msg+=' KO!';mkParticles(140+party.indexOf(tgt)*150,350,COL.ORANGE,15);}
else if(act==='attack'){const d=calcDmg(enemy);const a=applyDmg(tgt,d,false);msg=enemy.displayName+' attacks '+tgt.name+'! '+a+' dmg!';if(!tgt.alive)msg+=' KO!';mkParticles(140+party.indexOf(tgt)*150,350,COL.RED,8);}
bLog(msg);
}

function checkBattleEnd(){
const allDead=btl.enemies.every(e=>e.dead);
const partyDead=party.every(m=>!m.alive||m.hp<=0);
if(allDead){
let exp=0,gold=0;btl.enemies.forEach(e=>{exp+=e.exp;gold+=e.gold;});
inventory.gold+=gold;bLog('Victory! +'+exp+' EXP +'+gold+' Gil!');
let lvl=false;
party.forEach(m=>{if(m.alive){m.exp+=exp;while(m.exp>=m.expNext){lvl=true;levelUp(m);}}});
btl.phase='victory';
setTimeout(()=>{gameState=lvl?STATES.LEVELUP:STATES.WORLD;},1800);
return 'win';
}
if(partyDead){btl.phase='defeat';setTimeout(()=>{gameState=STATES.GAMEOVER;},1800);return 'lose';}
return null;
}
function levelUp(m){
m.exp-=m.expNext;m.level++;m.expNext=Math.floor(m.expNext*1.4);
const hg=12+Math.floor(Math.random()*18),mg=m.maxMp>0?4+Math.floor(Math.random()*7):0;
m.maxHp+=hg;m.hp=m.maxHp;m.maxMp+=mg;m.mp=m.maxMp;
m.str+=Math.floor(Math.random()*3);m.def+=Math.floor(Math.random()*2);
m.mag+=Math.floor(Math.random()*3);m.spd+=Math.floor(Math.random()*2);
const learnT={'Black Mage':{3:['Fira','Blizzara'],5:['Thundara'],7:['Firaga'],9:['Blizzaga','Drain'],11:['Thundaga'],13:['Quake','Bio'],15:['Meteor']},'White Mage':{3:['Cura','Protect'],5:['Shell'],7:['Haste','Esuna'],9:['Curaga'],11:['Life'],13:['Holy']}};
const tbl=learnT[m.cls];if(tbl&&tbl[m.level])tbl[m.level].forEach(s=>{if(!m.spells.includes(s))m.spells.push(s);});
bLog(m.name+' reached Lv '+m.level+'!');
}
// BATTLE INPUT
let btlActionQueue=[];
let btlActTimer=0;
function handleBattleInput(){
if(btl.phase==='victory'||btl.phase==='defeat')return;
if(btlActionQueue.length>0){
btlActTimer++;
if(btlActTimer>45){btlActTimer=0;processNextAction();}
return;
}
if(btl.phase==='enemy'){processEnemyTurns();return;}
// Player selection
if(justPressed['ArrowUp']){if(btl.menu==='main')btl.selAction=Math.max(0,(btl.selAction||0)-1);else if(btl.menu==='target_e')btl.selTarget=Math.max(0,btl.selTarget-1);else if(btl.menu==='target_p')btl.selTarget=Math.max(0,btl.selTarget-1);else if(btl.menu==='spell')btl.selSpell=Math.max(0,btl.selSpell-1);else if(btl.menu==='item')btl.selItem=Math.max(0,btl.selItem-1);}
if(justPressed['ArrowDown']){if(btl.menu==='main')btl.selAction=Math.min(3,(btl.selAction||0)+1);else if(btl.menu==='target_e')btl.selTarget=Math.min(btl.enemies.filter(e=>!e.dead).length-1,btl.selTarget+1);else if(btl.menu==='target_p')btl.selTarget=Math.min(party.filter(m=>m.alive).length-1,btl.selTarget+1);else if(btl.menu==='spell')btl.selSpell=Math.min((party[btl.selMember].spells.length||1)-1,btl.selSpell+1);else if(btl.menu==='item')btl.selItem=Math.min(Math.max(0,inventory.items.length-1),btl.selItem+1);}
if(justPressed['KeyZ']||justPressed['Enter']||justPressed['Space']){
const mbr=party[btl.selMember];
if(btl.menu==='main'){
btl.selAction=btl.selAction||0;
const actions=['attack','magic','item','flee'];
const chosen=actions[btl.selAction];
if(chosen==='attack'){btl.menu='target_e';btl.selTarget=0;const alive=btl.enemies.filter(e=>!e.dead);btl.selTarget=alive.indexOf(alive[0]);}
else if(chosen==='magic'){if(mbr.spells.length>0){btl.menu='spell';btl.selSpell=0;}else bLog('No spells!');}
else if(chosen==='item'){if(inventory.items.length>0){btl.menu='item';btl.selItem=0;}else bLog('No items!');}
else if(chosen==='flee'){const flee=Math.random()>0.45;if(flee){bLog('Fled successfully!');setTimeout(()=>{gameState=STATES.WORLD;},1000);}else bLog('Could not escape!');btl.menu='main';}
}else if(btl.menu==='target_e'){
const alive=btl.enemies.filter(e=>!e.dead);
if(alive.length>0){const tgt=alive[Math.min(btl.selTarget,alive.length-1)];
const msg=doPlayerAction(mbr,'attack',tgt,null,null);
if(msg!=='No items!'&&msg!=='No spells!'){checkBattleEnd();advanceTurn();}
btl.menu='main';}
}else if(btl.menu==='spell'){
const spName=mbr.spells[btl.selSpell];
const sp=SPELLS[spName];if(!sp){btl.menu='main';return;}
if(sp.tgt==='all'||sp.type==='buff'){
doPlayerAction(mbr,'magic',party[0],spName,null);
checkBattleEnd();advanceTurn();btl.menu='main';
}else if(sp.type==='heal'||sp.type==='revive'){btl.menu='target_p';btl.selTarget=0;btl.pendingSpell=spName;}
else{btl.menu='target_e2';btl.selTarget=0;btl.pendingSpell=spName;}
}else if(btl.menu==='target_e2'){
const alive=btl.enemies.filter(e=>!e.dead);
if(alive.length>0){const tgt=alive[Math.min(btl.selTarget,alive.length-1)];
doPlayerAction(mbr,'magic',tgt,btl.pendingSpell,null);checkBattleEnd();advanceTurn();}
btl.menu='main';
}else if(btl.menu==='target_p'){
const al=party.filter(m=>m.alive||(SPELLS[btl.pendingSpell]?.type==='revive'&&!m.alive));
if(al.length>0){const tgt=al[Math.min(btl.selTarget,al.length-1)];
doPlayerAction(mbr,'magic',tgt,btl.pendingSpell,null);checkBattleEnd();advanceTurn();}
btl.menu='main';
}else if(btl.menu==='item'){
const itm=inventory.items[btl.selItem];if(!itm){btl.menu='main';return;}
if(itm.effect==='revive'||itm.effect==='heal'||itm.effect==='mp'||itm.effect==='elixir'||itm.effect==='cure_poison'){btl.menu='target_p2';btl.pendingItem=itm.name;}
else{doPlayerAction(mbr,'item',mbr,null,itm.name);checkBattleEnd();advanceTurn();btl.menu='main';}
}else if(btl.menu==='target_p2'){
const al=party;const tgt=al[Math.min(btl.selTarget,al.length-1)];
doPlayerAction(mbr,'item',tgt,null,btl.pendingItem);checkBattleEnd();advanceTurn();btl.menu='main';
}
}
if(justPressed['KeyX']||justPressed['Escape']){if(btl.menu!=='main')btl.menu='main';}
}
function advanceTurn(){
btl.selMember++;
if(btl.selMember>=party.length)btl.selMember=0;
// Find next alive party member or switch to enemy phase
let tries=0;
while(tries<4&&(!party[btl.selMember].alive||party[btl.selMember].hp<=0)){btl.selMember=(btl.selMember+1)%party.length;tries++;}
if(tries>=4||party.filter(m=>m.alive).every(m=>m.hp<=0)){btl.phase='enemy';processEnemyTurns();}
else btl.phase='select';
}
function processEnemyTurns(){
const al=btl.enemies.filter(e=>!e.dead);
al.forEach(e=>doEnemyTurn(e));
checkBattleEnd();
btl.selMember=getAlive();btl.phase='select';btl.menu='main';
}

function drawWorld(){

const tileColors2={[TILE.GRASS]:COL.GRASS2,[TILE.WATER]:COL.WATER2,[TILE.MOUNTAIN]:COL.MOUNTAIN2};
ctx.fillStyle='#000';ctx.fillRect(0,0,800,480);
// Draw tiles
for(let ty=0;ty<VTY+1;ty++){for(let tx=0;tx<VTX+1;tx++){
const wx=tx+camX,wy=ty+camY;
if(wx<0||wy<0||wx>=worldMap[0].length||wy>=worldMap.length)continue;

const sx=tx*TS,sy=ty*TS;

else if(tile===TILE.MOUNTAIN){ctx.fillStyle=COL.MOUNTAIN2;ctx.fillRect(sx+TS/4,sy,TS/2,TS*0.7|0);}
else if(tile===TILE.FOREST){ctx.fillStyle='#0A2A0A';for(let i=0;i<3;i++)ctx.fillRect(sx+5+i*12,sy+5,8,TS-10);}
else if(tile===TILE.SNOW){ctx.fillStyle='rgba(200,200,255,0.4)';ctx.fillRect(sx,sy,TS,TS/2|0);}
else if(tile===TILE.TOWN){ctx.fillStyle='#CC9944';ctx.fillRect(sx+8,sy+5,TS-16,TS-12);}
else if(tile===TILE.CAVE){ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx+TS/2,sy+TS/2,TS/3,0,Math.PI*2);ctx.fill();}
else if(tile===TILE.DUNGEON){ctx.fillStyle='#111';ctx.fillRect(sx+5,sy+5,TS-10,TS-10);}
else if(tile===TILE.ROAD){ctx.fillStyle='#AA9977';ctx.fillRect(sx+TS/3,sy,TS/3,TS);}
// Grid shadow
ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.strokeRect(sx,sy,TS,TS);
// Location names
const loc=locations.find(l=>l.x===wx&&l.y===wy);
if(loc){ctx.fillStyle='#FFFFFF';ctx.font='9px "Courier New"';ctx.textAlign='center';ctx.fillText(loc.name,sx+TS/2,sy+TS-3);ctx.textAlign='left';}
}}
// Draw player character
const psx=(px-camX)*TS,psy=(py-camY)*TS;
const bobY=Math.sin(walkAnim)*3;
ctx.fillStyle='#FFFFFF';ctx.fillRect(psx+10,psy+2+bobY,20,20);// body

ctx.fillStyle='#FFD700';ctx.fillRect(psx+8,psy+22+bobY,5,8);// left leg
ctx.fillRect(psx+27,psy+22+bobY,5,8);// right leg
}

dText('-- ITEMS  (Gold: '+inventory.gold+' Gil) --',20,68,'#FFD700',14);
if(inventory.items.length===0){dTextC('No items!',400,300,'#AAAACC',18);return;}
inventory.items.forEach((it,i)=>{const sel=i===itemCursor;dBox(15,85+i*40,770,36,sel?'rgba(20,40,80,0.9)':'rgba(5,5,25,0.6)',sel?'#AABBFF':'#4466AA');
dText(it.name,30,108+i*40,sel?'#FFD700':'#FFFFFF',14);dText('x'+it.qty,200,108+i*40,'#AAAACC',13);dText(it.desc,250,108+i*40,'#CCCCAA',12);});
if(inventory.items[itemCursor])dText('Selected: '+inventory.items[itemCursor].desc,20,570,'#AACCFF',13);
}
let magicChar=0;
function drawMagicTab(){
// Char select
party.forEach((m,i)=>{const sel=i===magicChar;dBox(5+i*198,55,193,45,sel?'rgba(20,30,80,0.9)':'rgba(5,5,25,0.6)',sel?'#AA88FF':'#4466AA');dText((sel?'> ':' ')+m.name,15+i*198,82,sel?'#FFD700':'#FFFFFF',14);});
const m=party[magicChar];dText('-- '+m.name+"'s Spells --",20,115,'#AA88FF',14);
if(m.spells.length===0){dText('No spells learned.',30,140,'#AAAACC',13);}
m.spells.forEach((s,i)=>{const sp=SPELLS[s];if(!sp)return;const x=20+(i%3)*260,y=140+Math.floor(i/3)*50;dBox(x,y,250,42,'rgba(5,5,25,0.7)','#AA44FF');dText(s,x+10,y+16,'#CCAAFF',13);dText((sp.mp||0)+' MP',x+160,y+16,'#8888FF',12);dText(sp.type==='heal'?'Heal':sp.type==='magic'?'Elem':sp.type,x+10,y+33,'#888899',11);});
}
function drawSaveTab(){
dTextC('-- SAVE GAME --',400,100,'#FFD700',18);
dBox(200,130,400,80,'rgba(5,5,20,0.9)','#AABBFF');dText('Your progress is auto-saved',220,165,'#FFFFFF',14);dText('to your browser's local storage.',220,183,'#AAAACC',12);
dBox(200,225,400,40);dTextC('Save to LocalStorage',400,250,'#44FF88',14);
dBox(200,275,400,40);dTextC('Load from LocalStorage',400,300,'#FFAA44',14);
dText('Party Level: '+Math.round(party.reduce((s,m)=>s+m.level,0)/party.length),220,360,'#CCDDFF',14);
dText('Total Gold: '+inventory.gold+' Gil',220,380,'#FFD700',14);
}

// SHOP SYSTEM
let shopLoc=null,shopCursor=0,shopMode='buy';
function openShop(loc){shopLoc=loc;shopCursor=0;shopMode='buy';gameState=STATES.SHOP;}
function drawShop(){
ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,800,600);
dBox(50,30,700,540,'rgba(3,3,15,0.97)','#AA8833');
dTextC('~~ ITEM SHOP: '+shopLoc.name+' ~~',400,58,'#FFD700',18);
dTextC('Gold: '+inventory.gold+' Gil',400,80,'#FFDD88',14);
// Mode tabs
dBox(60,90,160,35,shopMode==='buy'?'rgba(20,40,10,0.9)':'rgba(5,5,15,0.6)',shopMode==='buy'?'#44FF88':'#4466AA');
dBox(230,90,160,35,shopMode==='sell'?'rgba(20,40,10,0.9)':'rgba(5,5,15,0.6)',shopMode==='sell'?'#44FF88':'#4466AA');
dBox(400,90,160,35,shopMode==='inn'?'rgba(20,40,10,0.9)':'rgba(5,5,15,0.6)',shopMode==='inn'?'#44FF88':'#4466AA');
dTextC('BUY',140,112,shopMode==='buy'?'#FFD700':'#AAAACC',14);dTextC('SELL',310,112,shopMode==='sell'?'#FFD700':'#AAAACC',14);
dTextC('INN',480,112,'#FF8844',14);
if(shopMode==='buy'){
dText('-- Items for Sale --',70,148,'#CCDDAA',13);
shopLoc.shopItems.forEach((name,i)=>{
const sel=i===shopCursor;
dBox(60,160+i*45,680,40,sel?'rgba(30,50,10,0.9)':'rgba(5,5,15,0.6)',sel?'#44FF88':'#4466AA');
const cost=ITEM_COSTS[name]||99;
const owned=inventory.items.find(it=>it.name===name);
dText(name,80,183+i*45,sel?'#FFD700':'#FFFFFF',14);
dText(cost+' Gil',300,183+i*45,'#FFDD44',13);
dText('Owned: '+(owned?owned.qty:0),450,183+i*45,'#AAAACC',12);
});
dText('Z: Buy   X: Cancel   Arrows: Select',70,560,'#557744',13);
}else if(shopMode==='inn'){
dBox(150,200,500,200,'rgba(5,5,20,0.9)','#FF8844');
dTextC('Rest at the Inn?',400,240,'#FFFFFF',18);dTextC('Cost: '+shopLoc.innCost+' Gil',400,270,'#FFDD44',16);
dTextC('Restores full HP and MP for all!',400,300,'#AACCAA',14);
dBox(175,330,200,50);dTextC('Rest (Z)',275,360,'#44FF88',16);
dBox(425,330,200,50);dTextC('Leave (X)',525,360,'#FF4444',16);
}else{dTextC('No items to sell yet.',400,300,'#AAAACC',16);}
}
function handleShopInput(){
if(justPressed['ArrowUp'])shopCursor=Math.max(0,shopCursor-1);
if(justPressed['ArrowDown']){const max=shopMode==='buy'?shopLoc.shopItems.length-1:0;shopCursor=Math.min(max,shopCursor+1);}
if(justPressed['ArrowLeft']||justPressed['ArrowRight']){const modes=['buy','sell','inn'];const idx=modes.indexOf(shopMode);shopMode=modes[(idx+1)%3];shopCursor=0;}
if(justPressed['KeyZ']||justPressed['Enter']){
if(shopMode==='buy'){
const name=shopLoc.shopItems[shopCursor];const cost=ITEM_COSTS[name]||99;
if(inventory.gold>=cost){inventory.gold-=cost;const ex=inventory.items.find(i=>i.name===name);if(ex)ex.qty++;else{const base={Potion:{effect:'heal',value:100},HiPotion:{effect:'heal',value:250},Ether:{effect:'mp',value:30},Antidote:{effect:'cure_poison',value:0},Tent:{effect:'rest',value:0},PhoenixDown:{effect:'revive',value:0},Elixir:{effect:'elixir',value:0},MegaPotion:{effect:'heal',value:500}};const b=base[name]||{effect:'heal',value:50};inventory.items.push({name,qty:1,type:'item',target:'single',cost,...b,desc:name});}}
else bLog('Not enough gold!');
}else if(shopMode==='inn'){
if(inventory.gold>=shopLoc.innCost){inventory.gold-=shopLoc.innCost;party.forEach(m=>{if(m.alive){m.hp=m.maxHp;m.mp=m.maxMp;}});bLog('The party rested! HP and MP restored!');}
else bLog('Not enough gold!');
gameState=STATES.WORLD;
}
}
if(justPressed['KeyX']||justPressed['Escape'])gameState=STATES.WORLD;
}

// GAME OVER & LEVEL UP SCREENS
let lvlUpTimer=0,lvlUpData=[];
function drawGameOver(){
ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,800,600);
ctx.fillStyle='rgba(100,0,0,0.5)';ctx.fillRect(0,0,800,600);
dTextC('GAME OVER',400,220,'#FF2222',52);
dTextC('The party has been defeated...',400,300,'#AA4444',18);
dTextC('Press Z to return to Title Screen',400,380,'#886666',15);
}
function drawLevelUp(){
ctx.fillStyle='rgba(0,0,20,0.95)';ctx.fillRect(0,0,800,600);
dBox(150,80,500,440,'rgba(5,5,30,0.97)','#FFD700');
dTextC('~ LEVEL UP! ~',400,115,'#FFD700',22);
lvlUpData.forEach((d,i)=>{
dBox(170,140+i*100,460,90,'rgba(10,10,40,0.9)','#AABBFF');
dText(d.name+' is now Level '+d.level+'!',185,163+i*100,'#FFFFFF',14);
dText('+'+d.hpGain+' HP  +'+d.mpGain+' MP  +'+d.strGain+' STR',185,183+i*100,'#44FF88',13);
if(d.newSpell)dText('Learned: '+d.newSpell+'!',185,200+i*100,'#AA44FF',13);
});
dTextC('Press Z to continue!',400,500,'#FFDD44',16);
}
function drawDialog(){
dBox(100,350,600,200,'rgba(3,3,15,0.97)','#4466AA');
dTextC(dialogText||'...',400,420,'#FFFFFF',16);
dTextC('Z: Continue',400,500,'#AAAACC',13);
}
let dialogText='',dialogCallback=null;
function showDialog(text,cb){dialogText=text;dialogCallback=cb;gameState=STATES.DIALOG;}

// WORLD MAP MOVEMENT & ENCOUNTERS
let frame=0,encSteps=0,encThreshold=15+Math.floor(Math.random()*10);
let walkDir=0,walkAnim2=0;
const walkableFrom={[TILE.GRASS]:true,[TILE.SAND]:true,[TILE.FOREST]:true,[TILE.ROAD]:true};
const townTiles=[TILE.TOWN];const dungeonTiles=[TILE.CAVE,TILE.DUNGEON];
function handleWorldInput(){
if(justPressed['KeyM']||justPressed['KeyI']){menuCursor=0;prevState=gameState;gameState=STATES.MENU;return;}
let nx=px,ny=py,moved=false,dir=0;
if(keys['ArrowLeft']&&frame%8===0){nx--;dir=1;moved=true;}
else if(keys['ArrowRight']&&frame%8===0){nx++;dir=2;moved=true;}
else if(keys['ArrowUp']&&frame%8===0){ny--;dir=3;moved=true;}
else if(keys['ArrowDown']&&frame%8===0){ny++;dir=4;moved=true;}
if(moved){
if(nx<0||ny<0||nx>=worldMap[0].length||ny>=worldMap.length)return;
const tile=worldMap[ny][nx];
if(tile===TILE.MOUNTAIN||tile===TILE.WATER)return;
// Check for town/dungeon entry
const loc=locations.find(l=>l.x===nx&&l.y===ny);
if(loc){
if(loc.type==='town'){openShop(loc);px=nx;py=ny;return;}
else if(loc.type==='cave'||loc.type==='dungeon'){
showDialog('Entering '+loc.name+'...',null);
px=nx;py=ny;
setTimeout(()=>{const area=loc.type==='dungeon'?'dungeon':'cave';startBattle(area);},500);
return;
}
}
px=nx;py=ny;walkAnim2+=0.5;
// Update camera
const halfX=Math.floor(VTX/2),halfY=Math.floor(VTY/2);
camX=Math.max(0,Math.min(worldMap[0].length-VTX,px-halfX));
camY=Math.max(0,Math.min(worldMap.length-VTY,py-halfY));
// Random encounter
const areaType=getTileArea(tile);
if(areaType){
encSteps++;
if(encSteps>=encThreshold){
encSteps=0;encThreshold=12+Math.floor(Math.random()*10);
if(Math.random()<0.65)startBattle(areaType);
}
}
}
if(justPressed['KeyZ']||justPressed['Enter']){
// Check adjacent locations
const loc=locations.find(l=>l.x===px&&l.y===py);
if(loc){if(loc.type==='town')openShop(loc);}
}
}
function getTileArea(t){
const m={[TILE.GRASS]:'grass',[TILE.FOREST]:'forest',[TILE.SAND]:'sand',[TILE.MOUNTAIN]:'mountain'};
return m[t]||null;
}

// MENU INPUT HANDLING
function handleMenuInput(){
if(justPressed['ArrowLeft'])menuCursor=Math.max(0,menuCursor-1);
if(justPressed['ArrowRight'])menuCursor=Math.min(menuTabs.length-1,menuCursor+1);
if(menuTabs[menuCursor]==='Status'){if(justPressed['ArrowUp'])statusChar=Math.max(0,statusChar-1);if(justPressed['ArrowDown'])statusChar=Math.min(party.length-1,statusChar+1);}
if(menuTabs[menuCursor]==='Items'){if(justPressed['ArrowUp'])itemCursor=Math.max(0,itemCursor-1);if(justPressed['ArrowDown'])itemCursor=Math.min(inventory.items.length-1,itemCursor+1);}
if(menuTabs[menuCursor]==='Magic'){if(justPressed['ArrowUp'])magicChar=Math.max(0,magicChar-1);if(justPressed['ArrowDown'])magicChar=Math.min(party.length-1,magicChar+1);}
if(menuTabs[menuCursor]==='Save'){
if(justPressed['KeyZ']||justPressed['Enter']){
const save={party:JSON.parse(JSON.stringify(party)),inventory:JSON.parse(JSON.stringify(inventory)),px,py};
try{localStorage.setItem('crystalChronicles',JSON.stringify(save));alert('Game saved!');}catch(e){}
}
}
if(justPressed['KeyX']||justPressed['Escape']||justPressed['KeyM'])gameState=prevState||STATES.WORLD;
}
// TITLE SCREEN INPUT
function handleTitleInput(){
if(justPressed['ArrowUp']||justPressed['ArrowLeft'])titleOpt=Math.max(0,titleOpt-1);
if(justPressed['ArrowDown']||justPressed['ArrowRight'])titleOpt=Math.min(1,titleOpt+1);
if(justPressed['KeyZ']||justPressed['Enter']||justPressed['Space']){
if(titleOpt===0){
// Load save if exists
try{const s=localStorage.getItem('crystalChronicles');if(s){const d=JSON.parse(s);Object.assign(party,d.party);Object.assign(inventory,d.inventory);px=d.px||3;py=d.py||8;}}catch(e){}
gameState=STATES.WORLD;
}else{
showDialog('Controls: Arrow Keys=Move/Select  Z/Enter=Confirm  X/Esc=Cancel  M/I=Menu | Explore the world, fight enemies, level up! Visit towns to buy items and rest at inns.',()=>{});
}
}
}
// LEVEL UP INPUT
function handleLevelUpInput(){
if(justPressed['KeyZ']||justPressed['Enter']||justPressed['Space']){gameState=STATES.WORLD;}
}
// GAMEOVER INPUT  
function handleGameOverInput(){
if(justPressed['KeyZ']||justPressed['Enter']){
// Revive with 1 HP
party.forEach(m=>{m.alive=true;m.hp=Math.max(1,Math.floor(m.maxHp*0.2));});
gameState=STATES.TITLE;
}
}
// DIALOG INPUT
function handleDialogInput(){if(justPressed['KeyZ']||justPressed['Enter']){if(dialogCallback)dialogCallback();else gameState=prevState||STATES.WORLD;}}

// MAIN GAME LOOP
function update(){
frame++;
if(gameState===STATES.TITLE)handleTitleInput();
else if(gameState===STATES.WORLD)handleWorldInput();
else if(gameState===STATES.BATTLE){updParticles();handleBattleInput();}
else if(gameState===STATES.MENU)handleMenuInput();
else if(gameState===STATES.SHOP)handleShopInput();
else if(gameState===STATES.LEVELUP)handleLevelUpInput();
else if(gameState===STATES.GAMEOVER)handleGameOverInput();
else if(gameState===STATES.DIALOG)handleDialogInput();
clrJP();
}
function draw(){
ctx.clearRect(0,0,800,600);
if(gameState===STATES.TITLE)drawTitle();
else if(gameState===STATES.WORLD){drawWorld();drawHUD();}
else if(gameState===STATES.BATTLE)drawBattle();
else if(gameState===STATES.MENU){drawWorld();drawHUD();drawMenu();}
else if(gameState===STATES.SHOP)drawShop();
else if(gameState===STATES.LEVELUP)drawLevelUp();
else if(gameState===STATES.GAMEOVER)drawGameOver();
else if(gameState===STATES.DIALOG){drawWorld();drawHUD();drawDialog();}
}
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
// Initialize camera
const hxInit=Math.floor(VTX/2),hyInit=Math.floor(VTY/2);
camX=Math.max(0,Math.min(worldMap[0].length-VTX,px-hxInit));
camY=Math.max(0,Math.min(worldMap.length-VTY,py-hyInit));
gameLoop();
</script>
