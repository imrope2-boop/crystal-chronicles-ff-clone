const EN={Goblin:{hp:45,mp:0,str:12,def:8,mag:4,spd:8,exp:30,gold:20,a:["attack","attack","attack"],sp:[],c:"#44FF44"},Imp:{hp:38,mp:8,str:10,def:6,mag:10,spd:12,exp:25,gold:15,a:["attack","magic","attack"],sp:["Fire"],c:"#FF44FF"},Wolf:{hp:60,mp:0,str:16,def:10,mag:4,spd:14,exp:40,gold:25,a:["attack","attack"],sp:[],c:"#AAAAAA"},Skeleton:{hp:80,mp:0,str:20,def:12,mag:0,spd:8,exp:55,gold:35,a:["attack","attack","attack"],sp:[],c:"#EEEEEE"},Lizardman:{hp:120,mp:0,str:25,def:18,mag:8,spd:10,exp:80,gold:50,a:["attack","attack","attack"],sp:[],c:"#44AA44"},Ogre:{hp:180,mp:0,str:30,def:22,mag:5,spd:6,exp:120,gold:80,a:["attack","attack","special"],sp:[],c:"#AA6633"},Harpy:{hp:100,mp:20,str:22,def:14,mag:15,spd:16,exp:100,gold:65,a:["attack","magic","attack"],sp:["Thunder"],c:"#FFAAFF"},Vampire:{hp:200,mp:30,str:28,def:20,mag:20,spd:14,exp:180,gold:120,a:["attack","magic","drain"],sp:["Bio"],c:"#AA44AA"},Troll:{hp:250,mp:0,str:35,def:28,mag:5,spd:5,exp:200,gold:150,a:["attack","attack","special"],sp:[],c:"#558855"},Wyvern:{hp:320,mp:40,str:40,def:30,mag:25,spd:12,exp:280,gold:200,a:["attack","magic","special"],sp:["Fire"],c:"#FF8844"},Lich:{hp:450,mp:80,str:35,def:25,mag:45,spd:10,exp:500,gold:400,boss:true,a:["magic","magic","attack","special"],sp:["Blizzaga","Thundaga","Bio"],c:"#8888FF"},Marilith:{hp:600,mp:60,str:50,def:35,mag:35,spd:15,exp:700,gold:500,boss:true,a:["attack","attack","magic","special"],sp:["Firaga"],c:"#FF4444"},Kraken:{hp:800,mp:70,str:55,def:40,mag:40,spd:8,exp:900,gold:600,boss:true,a:["attack","magic","attack","special"],sp:["Blizzaga"],c:"#4444FF"},Tiamat:{hp:1000,mp:80,str:60,def:45,mag:50,spd:12,exp:1200,gold:800,boss:true,a:["magic","attack","magic","special"],sp:["Thundaga","Meteor"],c:"#AA44FF"},Chaos:{hp:2000,mp:100,str:70,def:50,mag:60,spd:14,exp:5000,gold:2000,boss:true,a:["magic","attack","special","magic"],sp:["Meteor","Thundaga","Firaga"],c:"#FF0000"}};
const ENC={grass:["Goblin","Wolf","Imp","Goblin"],forest:["Lizardman","Wolf","Harpy","Skeleton"],cave:["Skeleton","Vampire","Troll","Ogre"],dungeon:["Vampire","Wyvern","Troll"],sand:["Goblin","Lizardman","Wolf","Harpy"]};
let b={enemies:[],phase:"select",selMbr:0,selAct:0,selTgt:0,selSp:0,selIt:0,menu:"main",log:[],pts:[],bg:"#000820",pSp:"",pIt:""};
function mkE(n){const t=EN[n];return{...JSON.parse(JSON.stringify(t)),maxHp:t.hp,maxMp:t.mp||0,dn:n,dead:false};}
function gAlive(){return party.findIndex(m=>m.alive&&m.hp>0);}
function bLog(m){b.log.push(m);if(b.log.length>5)b.log.shift();}
function mkP(x,y,col,n){for(let i=0;i<n;i++)b.pts.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.8)*9,life:1,decay:.04+Math.random()*.03,col,sz:2+Math.random()*5});}
function uP(){b.pts=b.pts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life-=p.decay;return p.life>0;});}
function startB(area){const tbl=ENC[area]||ENC.grass;const cnt=1+Math.floor(Math.random()*3);b.enemies=[];const used={};for(let i=0;i<Math.min(cnt,4);i++){const n=tbl[Math.floor(Math.random()*tbl.length)];used[n]=(used[n]||0)+1;const e=mkE(n);if(used[n]>1)e.dn=n+" "+used[n];b.enemies.push(e);}b.phase="select";b.selMbr=gAlive();b.menu="main";b.selAct=0;b.log=["A battle begins!"];b.pts=[];b.bg=area==="dungeon"?"#0A0005":area==="cave"?"#050A00":"#000820";gs=STATES.B;}
function cD(atk,sp){if(sp){const s=SP[sp];if(!s)return 0;const base=s.min+Math.random()*(s.max-s.min);return Math.floor(base*(1+(atk.mag||10)*.05));}const s=atk.str||10;return Math.max(1,Math.floor(s*1.8+Math.random()*s*.6));}
function aD(tgt,dmg,heal){if(heal){tgt.hp=Math.min(tgt.maxHp,tgt.hp+dmg);return dmg;}const red=Math.floor((tgt.def||0)/3);const a=Math.max(1,dmg-red);tgt.hp=Math.max(0,tgt.hp-a);if(tgt.hp<=0){"alive" in tgt?tgt.alive=false:tgt.dead=true;}return a;}
function doPA(mbr,action,tgt,spN,itN){let msg="";
if(action==="attack"){const d=cD(mbr);const a=aD(tgt,d,false);msg=mbr.name+" attacks "+tgt.dn+"! "+a+" dmg!";mkP(500+b.enemies.indexOf(tgt)*90,280,C.RD,10);if(tgt.dead)msg+=" KO!";}
else if(action==="magic"&&spN){const sp=SP[spN];if(!sp)return "No spell!";if(mbr.mp<sp.mp)return "Not enough MP!";mbr.mp-=sp.mp;
if(sp.t==="heal"){const h=Math.floor(sp.min+Math.random()*(sp.max-sp.min));const a=aD(tgt,h,true);msg=mbr.name+" casts "+spN+"! +"+a+" HP!";mkP(100+party.indexOf(tgt)*160,340,sp.color,12);}
else if(sp.t==="revive"){tgt.alive=true;tgt.hp=Math.max(1,Math.floor(tgt.maxHp*.3));msg=mbr.name+" casts "+spN+"! "+tgt.name+" revived!";mkP(100+party.indexOf(tgt)*160,340,"#FFF",20);}
else if(sp.t==="drain"){const d=cD(mbr,spN);const a=aD(tgt,d,false);mbr.hp=Math.min(mbr.maxHp,mbr.hp+(a>>1));msg=mbr.name+" drains "+tgt.dn+"! "+a+" stolen!";mkP(500+b.enemies.indexOf(tgt)*90,280,sp.color,12);}
else if(sp.tg==="a"){let tot=0;b.enemies.forEach(e=>{if(!e.dead){const d=cD(mbr,spN);const a=aD(e,d,false);tot+=a;}});msg=mbr.name+" casts "+spN+"! ~"+(tot/(b.enemies.length||1)|0)+" avg dmg!";mkP(500,250,sp.color,25);}
else{const d=cD(mbr,spN);const a=aD(tgt,d,false);msg=mbr.name+" casts "+spN+"! "+a+" dmg!";mkP(500+b.enemies.indexOf(tgt)*90,280,sp.color,15);if(tgt.dead)msg+=" KO!";}}
else if(action==="item"){const it=inv.items.find(i=>i.name===itN);if(!it||it.qty<=0)return "No items!";it.qty--;if(it.qty<=0)inv.items=inv.items.filter(i=>i.qty>0);
if(it.e==="heal"){const a=aD(tgt,it.v,true);msg=mbr.name+" uses "+itN+"! +"+a+" HP!";}
else if(it.e==="mp"){tgt.mp=Math.min(tgt.maxMp,tgt.mp+it.v);msg=mbr.name+" uses "+itN+"! +"+it.v+" MP!";}
else if(it.e==="revive"){tgt.alive=true;tgt.hp=Math.max(1,Math.floor(tgt.maxHp*.3));msg=mbr.name+" uses "+itN+"! Revived!";}
else if(it.e==="elixir"){tgt.hp=tgt.maxHp;tgt.mp=tgt.maxMp;msg=mbr.name+" uses "+itN+"! Fully restored!";}
else if(it.e==="cure_poison"){msg=mbr.name+" uses "+itN+"! Cured!";}
else if(it.e==="rest"){party.forEach(m=>{if(m.alive){m.hp=Math.min(m.maxHp,m.hp+150);m.mp=Math.min(m.maxMp,m.mp+40);}});msg="The party rests!";}
mkP(100+party.indexOf(tgt)*160,340,C.GR,10);}
bLog(msg);return msg;}
function doET(e){const al=party.filter(m=>m.alive&&m.hp>0);if(!al.length)return;const tgt=al[Math.floor(Math.random()*al.length)];const acts=e.a||["attack"];let act=acts[Math.floor(Math.random()*acts.length)];if(act==="magic"&&(!e.sp||!e.sp.length||e.mp<5))act="attack";let msg="";
if(act==="magic"&&e.sp&&e.sp.length){const sn=e.sp[Math.floor(Math.random()*e.sp.length)];const sp=SP[sn];if(sp&&e.mp>=sp.mp){e.mp-=sp.mp;if(sp.tg==="a"){party.forEach(m=>{if(m.alive){const d=cD(e,sn);aD(m,d,false);}});msg=e.dn+" casts "+sn+"! Party hit!";}else{const d=cD(e,sn);const a=aD(tgt,d,false);msg=e.dn+" casts "+sn+"! "+a+" dmg!";if(!tgt.alive)msg+=" KO!";mkP(100+party.indexOf(tgt)*160,340,sp.color||"#F0F",12);}}}else if(act==="drain"){const d=cD(e);const a=aD(tgt,d,false);e.hp=Math.min(e.maxHp,e.hp+(a>>1));msg=e.dn+" drains "+tgt.name+"! "+a+" HP!";}else if(act==="special"){const d=Math.floor(cD(e)*1.6);const a=aD(tgt,d,false);msg=e.dn+" special! "+a+" dmg!";if(!tgt.alive)msg+=" KO!";mkP(100+party.indexOf(tgt)*160,340,C.OR,15);}else{const d=cD(e);const a=aD(tgt,d,false);msg=e.dn+" attacks "+tgt.name+"! "+a+" dmg!";if(!tgt.alive)msg+=" KO!";mkP(100+party.indexOf(tgt)*160,340,C.RD,8);}bLog(msg);}
function chkEnd(){const aD2=b.enemies.every(e=>e.dead);const pD=party.every(m=>!m.alive||m.hp<=0);if(aD2){let exp=0,gold=0;b.enemies.forEach(e=>{exp+=e.exp;gold+=e.gold;});inv.gold+=gold;bLog("Victory! +"+exp+" EXP +"+gold+" Gil!");let lv=false;party.forEach(m=>{if(m.alive){m.exp+=exp;while(m.exp>=m.expNext){lv=true;lvUp(m);}}});b.phase="victory";setTimeout(()=>{gs=lv?STATES.LU:STATES.W;},1500);return "win";}if(pD){b.phase="defeat";setTimeout(()=>{gs=STATES.GO;},1500);return "lose";}return null;}
function lvUp(m){m.exp-=m.expNext;m.level++;m.expNext=Math.floor(m.expNext*1.4);const hg=12+Math.floor(Math.random()*18),mg=m.maxMp>0?4+Math.floor(Math.random()*7):0;m.maxHp+=hg;m.hp=m.maxHp;m.maxMp+=mg;m.mp=m.maxMp;m.str+=Math.floor(Math.random()*3);m.def+=Math.floor(Math.random()*2);m.mag+=Math.floor(Math.random()*3);m.spd+=Math.floor(Math.random()*2);const lT={"Black Mage":{3:["Fira","Blizzara"],5:["Thundara"],7:["Firaga"],9:["Blizzaga","Drain"],11:["Thundaga"],13:["Quake","Bio"],15:["Meteor"]},"White Mage":{3:["Cura","Protect"],5:["Shell"],7:["Haste","Esuna"],9:["Curaga"],11:["Life"],13:["Holy"]}};const tb=lT[m.cls];if(tb&&tb[m.level])tb[m.level].forEach(s=>{if(!m.spells.includes(s))m.spells.push(s);});bLog(m.name+" is Lv "+m.level+"!");}
function advT(){b.selMbr++;if(b.selMbr>=party.length)b.selMbr=0;let t=0;while(t<4&&(!party[b.selMbr].alive||party[b.selMbr].hp<=0)){b.selMbr=(b.selMbr+1)%party.length;t++;}if(t>=4){b.enemies.filter(e=>!e.dead).forEach(e=>doET(e));chkEnd();b.selMbr=gAlive();b.phase="select";b.menu="main";}else b.phase="select";}
function hB(){if(b.phase==="victory"||b.phase==="defeat")return;uP();
if(jp.ArrowUp){if(b.menu==="main")b.selAct=Math.max(0,b.selAct-1);else if(b.menu==="te"||b.menu==="te2")b.selTgt=Math.max(0,b.selTgt-1);else if(b.menu==="tp"||b.menu==="tp2")b.selTgt=Math.max(0,b.selTgt-1);else if(b.menu==="spell")b.selSp=Math.max(0,b.selSp-1);else if(b.menu==="item")b.selIt=Math.max(0,b.selIt-1);}
if(jp.ArrowDown){const ma=b.menu==="main"?3:b.menu==="te"||b.menu==="te2"?b.enemies.filter(e=>!e.dead).length-1:b.menu==="tp"||b.menu==="tp2"?party.length-1:b.menu==="spell"?(party[b.selMbr].spells.length-1):Math.max(0,inv.items.length-1);if(b.menu==="main")b.selAct=Math.min(ma,b.selAct+1);else if(b.menu==="te"||b.menu==="te2")b.selTgt=Math.min(ma,b.selTgt+1);else if(b.menu==="tp"||b.menu==="tp2")b.selTgt=Math.min(ma,b.selTgt+1);else if(b.menu==="spell")b.selSp=Math.min(ma,b.selSp+1);else if(b.menu==="item")b.selIt=Math.min(ma,b.selIt+1);}
if(jp.KeyZ||jp.Enter||jp.Space){const mbr=party[b.selMbr];
if(b.menu==="main"){const acts=["attack","magic","item","flee"];const ch=acts[b.selAct||0];if(ch==="attack"){b.menu="te";b.selTgt=0;}else if(ch==="magic"){if(mbr.spells.length>0){b.menu="spell";b.selSp=0;}else bLog("No spells!");}else if(ch==="item"){if(inv.items.length>0){b.menu="item";b.selIt=0;}else bLog("No items!");}else{if(Math.random()>.45){bLog("Fled!");setTimeout(()=>{gs=STATES.W;},800);}else bLog("Cannot escape!");b.menu="main";}}
else if(b.menu==="te"){const al=b.enemies.filter(e=>!e.dead);if(al.length){const t=al[Math.min(b.selTgt,al.length-1)];doPA(mbr,"attack",t,null,null);chkEnd();advT();b.menu="main";}}
else if(b.menu==="spell"){const sn=mbr.spells[b.selSp];const sp=SP[sn];if(!sp){b.menu="main";return;}if(sp.tg==="a"||sp.t==="buff"){doPA(mbr,"magic",party[0],sn,null);chkEnd();advT();b.menu="main";}else if(sp.t==="heal"||sp.t==="revive"){b.pSp=sn;b.menu="tp";b.selTgt=0;}else{b.pSp=sn;b.menu="te2";b.selTgt=0;}}
else if(b.menu==="te2"){const al=b.enemies.filter(e=>!e.dead);if(al.length){doPA(mbr,"magic",al[Math.min(b.selTgt,al.length-1)],b.pSp,null);chkEnd();advT();}b.menu="main";}
else if(b.menu==="tp"){doPA(mbr,"magic",party[Math.min(b.selTgt,party.length-1)],b.pSp,null);chkEnd();advT();b.menu="main";}
else if(b.menu==="item"){const it=inv.items[b.selIt];if(!it){b.menu="main";return;}if(it.e==="rest"){doPA(mbr,"item",mbr,null,it.name);chkEnd();advT();b.menu="main";}else{b.pIt=it.name;b.menu="tp2";b.selTgt=0;}}

function hW(){if(jp.KeyM||jp.KeyI){mCur=0;ps=STATES.W;gs=STATES.M;return;}let nx=px,ny=py,mv=false;if(keys.ArrowLeft&&frm%8===0){nx--;mv=true;}else if(keys.ArrowRight&&frm%8===0){nx++;mv=true;}else if(keys.ArrowUp&&frm%8===0){ny--;mv=true;}else if(keys.ArrowDown&&frm%8===0){ny++;mv=true;}if(mv){if(nx<0||ny<0||nx>=map[0].length||ny>=map.length)return;const tile=map[ny][nx];if(tile===TI.MT||tile===TI.WA)return;const loc=locs.find(l=>l.x===nx&&l.y===ny);if(loc){px=nx;py=ny;if(loc.t==="town"){openSh(loc);return;}else{showDlg("Entering "+loc.name+"...",null);setTimeout(()=>{startB(loc.t==="dungeon"?"dungeon":"cave");},500);return;}}px=nx;py=ny;wA+=.5;const hx=Math.floor(VX/2),hy=Math.floor(VY/2);cx=Math.max(0,Math.min(map[0].length-VX,px-hx));cy=Math.max(0,Math.min(map.length-VY,py-hy));const aM={0:"grass",3:"forest",4:"sand"};const area=aM[tile];if(area){eS++;if(eS>=eT){eS=0;eT=12+Math.floor(Math.random()*10);if(Math.random()<.65)startB(area);}}}if(jp.KeyZ||jp.Enter){const loc=locs.find(l=>l.x===px&&l.y===py);if(loc&&loc.t==="town")openSh(loc);}}
function hT(){if(jp.ArrowUp||jp.ArrowLeft)tOpt=Math.max(0,tOpt-1);if(jp.ArrowDown||jp.ArrowRight)tOpt=Math.min(1,tOpt+1);if(jp.KeyZ||jp.Enter||jp.Space){if(tOpt===0){try{const sv=localStorage.getItem("crystalChronicles");if(sv){const d=JSON.parse(sv);d.party.forEach((dp,i)=>{if(party[i])Object.assign(party[i],dp);});Object.assign(inv,d.inv);px=d.px||3;py=d.py||8;}}catch(e){}ps=STATES.W;gs=STATES.W;}else{showDlg("Controls: Arrow Keys=Move/Navigate | Z/Enter=Confirm | X/Esc=Cancel | M=Menu | Explore the world, fight enemies, level up! Visit towns to buy items. Find the Chaos Shrine to face CHAOS!",null);}}}
function update(){frm++;if(gs===STATES.T)hT();else if(gs===STATES.W)hW();else if(gs===STATES.B)hB();else if(gs===STATES.M)hM();else if(gs===STATES.SH)hSh();else if(gs===STATES.LU&&(jp.KeyZ||jp.Enter))gs=STATES.W;else if(gs===STATES.GO&&(jp.KeyZ||jp.Enter)){party.forEach(m=>{m.alive=true;m.hp=Math.max(1,Math.floor(m.maxHp*.2));});gs=STATES.T;}else if(gs===STATES.DI&&(jp.KeyZ||jp.Enter)){if(dCb)dCb();else gs=ps||STATES.W;}clr();}
function draw(){ctx.clearRect(0,0,800,600);if(gs===STATES.T)drawT();else if(gs===STATES.W){drawW();drawHUD();}else if(gs===STATES.B)drawB();else if(gs===STATES.M){drawW();drawHUD();drawM();}else if(gs===STATES.SH)drawSh();else if(gs===STATES.LU)drawLU();else if(gs===STATES.GO)drawGO();else if(gs===STATES.DI){drawW();drawHUD();drawDlg();}}
const hx0=Math.floor(VX/2),hy0=Math.floor(VY/2);cx=Math.max(0,Math.min(map[0].length-VX,px-hx0));cy=Math.max(0,Math.min(map.length-VY,py-hy0));
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
